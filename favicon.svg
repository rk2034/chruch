<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#1A1208" rx="20"/>
  
  <!-- Glow effect -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#C9A84C" stroke-width="2" opacity="0.3"/>
  
  <!-- Cross symbol -->
  <g transform="translate(50, 50)">
    <!-- Vertical bar -->
    <rect x="-6" y="-28" width="12" height="56" fill="#C9A84C" rx="3"/>
    <!-- Horizontal bar -->
    <rect x="-20" y="-10" width="40" height="12" fill="#C9A84C" rx="3"/>
    <!-- Light rays -->
    <circle cx="0" cy="0" r="8" fill="#F5E6B8" opacity="0.6"/>
  </g>
</svg>